<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naver Maps API Test</title>
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=ivi7xb15p7&submodules=geocoder"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    header { background: #1ec800; color: #fff; padding: 16px 24px; }
    header h1 { font-size: 20px; font-weight: 600; }
    #map { width: 100%; height: calc(100vh - 120px); }
    .controls { padding: 12px 24px; background: #fff; border-bottom: 1px solid #ddd; display: flex; gap: 8px; align-items: center; }
    .controls input { flex: 1; max-width: 400px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .controls button { padding: 8px 16px; background: #1ec800; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    .controls button:hover { background: #1ab300; }
    .status { font-size: 13px; color: #666; margin-left: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Naver Maps API Test</h1>
  </header>
  <div class="controls">
    <input type="text" id="address" placeholder="주소 검색 (예: 서울시청)" value="서울시청" />
    <button onclick="searchAddress()">검색</button>
    <span class="status" id="status">지도 로딩 중...</span>
  </div>
  <div id="map"></div>

  <script>
    let map;
    let marker;

    function initMap() {
      map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(37.5666, 126.9784),
        zoom: 15,
        zoomControl: true,
        zoomControlOptions: {
          position: naver.maps.Position.TOP_RIGHT
        }
      });

      marker = new naver.maps.Marker({
        position: new naver.maps.LatLng(37.5666, 126.9784),
        map: map
      });

      document.getElementById('status').textContent = 'API 연결 성공!';
    }

    function searchAddress() {
      const query = document.getElementById('address').value;
      if (!query) return;

      const statusEl = document.getElementById('status');
      statusEl.textContent = '검색 중...';

      naver.maps.Service.geocode({ query: query }, function(status, response) {
        if (status !== naver.maps.Service.Status.OK) {
          statusEl.textContent = '검색 실패: ' + status;
          return;
        }

        const result = response.v2;
        if (!result.addresses || result.addresses.length === 0) {
          statusEl.textContent = '검색 결과가 없습니다.';
          return;
        }

        const item = result.addresses[0];
        const latLng = new naver.maps.LatLng(parseFloat(item.y), parseFloat(item.x));

        map.setCenter(latLng);
        map.setZoom(16);
        marker.setPosition(latLng);

        statusEl.textContent = item.roadAddress || item.jibunAddress || `${item.y}, ${item.x}`;
      });
    }

    document.addEventListener('DOMContentLoaded', initMap);

    document.getElementById('address').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchAddress();
    });
  </script>
</body>
</html>
